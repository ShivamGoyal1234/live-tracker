# Production stack for VPS (Hostinger expects docker-compose.yaml at repo root).
# Local dev: docker compose -f docker-compose.dev.yml up

services:
  # Inline Caddy config (no bind mount) — Hostinger deploy path often lacks ./Caddyfile as a real file.
  caddy:
    image: caddy:2-alpine
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
    command:
      - sh
      - -c
      - |
          printf '%s\n' 'tracker.shivam-goyal.site {' '	reverse_proxy app:3000' '}' > /tmp/Caddyfile
          exec caddy run --config /tmp/Caddyfile

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: locationdb
      POSTGRES_USER: locuser
      POSTGRES_PASSWORD: locpass
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U locuser -d locationdb']
      interval: 3s
      timeout: 5s
      retries: 15
      start_period: 10s

  app:
    build:
      context: .
      dockerfile: backend/Dockerfile
    expose:
      - '3000'
    depends_on:
      kafka:
        condition: service_started
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://locuser:locpass@postgres:5432/locationdb
      KAFKA_BROKERS: kafka:29092
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production}
      OAUTH_CLIENT_ID: ${OAUTH_CLIENT_ID}
      OAUTH_CLIENT_SECRET: ${OAUTH_CLIENT_SECRET}
      CALLBACK_URL: ${CALLBACK_URL:-https://tracker.shivam-goyal.site/auth/google/callback}
      SESSION_SECRET: ${SESSION_SECRET:-change_me_too}

volumes:
  pg_data:
  caddy_data:
  caddy_config:
