# Merge into your VPS nginx (e.g. sites-available). TLS paths = yours from certbot / panel.
# Docker app is on 127.0.0.1:3011 when compose uses 127.0.0.1:3011:3000; if you use 3011:3000, use proxy_pass http://127.0.0.1:3011 anyway (nginx on host).

map $http_upgrade $connection_upgrade {
	default upgrade;
	''      close;
}

server {
	listen 80;
	listen [::]:80;
	server_name tracker.shivam-goyal.site;
	# return 301 https://$host$request_uri;  # uncomment when HTTPS is ready

	location / {
		proxy_pass http://127.0.0.1:3011;
		proxy_http_version 1.1;
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
		proxy_set_header Upgrade $http_upgrade;
		proxy_set_header Connection $connection_upgrade;
	}
}

